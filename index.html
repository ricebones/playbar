<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Playbar Live Service</title>
  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
    }
    #app {
      padding: 20px;
    }
  </style>
</head>
<body>
  <div id="app">
    <h1 id="title">Loading...</h1>
    <div id="content"></div>
  </div>

  <script>
    const API_BASE = "https://script.google.com/macros/s/AKfycbyhDNN4tqZslmKdWoROJFx21SwqFBRaL0ESOkZob2j08pc1ldavknh0CyhwjrsnvrRQ/exec?view=poster&id=pool
";

    function getParam(name, fallback = "") {
      const url = new URL(window.location.href);
      return url.searchParams.get(name) || fallback;
    }

    async function loadData() {
      const ids = getParam("ids", "pool");
      const url = `${API_BASE}?page=data&ids=${encodeURIComponent(ids)}`;

      const res = await fetch(url);
      const data = await res.json();

      document.getElementById("title").textContent = data.title || ids;
      document.getElementById("content").innerHTML =
        `<pre>${JSON.stringify(data, null, 2)}</pre>`;
    }

    loadData();
    setInterval(loadData, 60000);
  </script>
</body>
</html>
